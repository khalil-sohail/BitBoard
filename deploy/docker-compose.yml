services:
  nginx-proxy:
    image: jwilder/nginx-proxy:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - public-bridge
      - private-backend
    restart: always

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    environment:
      - DEFAULT_EMAIL=${DEFAULT_EMAIL:-admin@ksohail.com}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    depends_on:
      - nginx-proxy
    networks:
      - public-bridge
    restart: always

  frontend:
    image: ${REGISTRY}/chess-frontend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
      args:
        VIRTUAL_HOST: ${VIRTUAL_HOST}
        LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
        NODE_ENV: ${NODE_ENV:-production}
    container_name: chess-frontend
    environment:
      - PORT=${FRONTEND_PORT:-3000}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - HOSTNAME=0.0.0.0
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - VIRTUAL_PATH=/
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      - VIRTUAL_PORT=${FRONTEND_PORT:-3000}
    expose:
      - "${FRONTEND_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port = process.env.PORT; if (!port) process.exit(1); require('http').get('http://127.0.0.1:' + port + '/', (r) => { if (r.statusCode !== 200) process.exit(1); else process.exit(0); }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - private-backend
    restart: always

  backend:
    image: ${REGISTRY}/chess-backend:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: chess-backend
    environment:
      - ENGINE_PATH=${ENGINE_PATH:-/app/engine/chess-engine}
      - PORT=${BACKEND_PORT:-3001}
      - BACKEND_PORT=${BACKEND_PORT:-3001}
      - NODE_ENV=${NODE_ENV:-production}
      - BACKEND_ONLY=${BACKEND_ONLY:-true}
      - DEBUG=${ENGINE_DEBUG:-false}
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - VIRTUAL_PATH=/api/engine
      - VIRTUAL_PORT=${BACKEND_PORT:-3001}
    expose:
      - "${BACKEND_PORT:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port = process.env.PORT; if (!port) process.exit(1); require('http').get('http://127.0.0.1:' + port + '/', (r) => { if (r.statusCode !== 200) process.exit(1); else process.exit(0); }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - private-backend
    restart: always

volumes:
  certs:
  vhost:
  html:
  acme:

networks:
  public-bridge:
    driver: bridge
  private-backend:
    driver: bridge
